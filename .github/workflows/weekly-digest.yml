name: Weekly Digest — Sunday Performance Report

on:
  schedule:
    # 3 AM CT Sunday = 8:00 UTC Sunday (CDT)
    - cron: '0 8 * * 0'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Generate report but skip email'
        required: false
        default: 'false'

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests anthropic google-api-python-client \
            google-auth google-auth-httplib2 google-auth-oauthlib

      - name: Write YouTube token files
        run: |
          echo '${{ secrets.YT_TOKEN_TMF }}' > youtube_token_tmf.json
          echo '${{ secrets.YT_TOKEN_BSG }}' > youtube_token_bsg.json
          echo '${{ secrets.YT_TOKEN_MZ }}'  > youtube_token_mz.json

      - name: Run weekly digest
        env:
          GOOGLE_SHEETS_KEY:  ${{ secrets.GOOGLE_SHEETS_KEY }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python3 weekly_digest.py
        continue-on-error: true

      - name: Upload digest log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-digest-log
          path: weekly_digest.py
          retention-days: 14
