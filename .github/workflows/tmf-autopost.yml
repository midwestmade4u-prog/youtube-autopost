name: YouTube Auto-Post - The Mind Files

on:
  schedule:
    # 7 AM CST = 13:00 UTC
    - cron: '0 13 * * *'
    # 12 PM CST = 18:00 UTC
    - cron: '0 18 * * *'
    # 9 PM CST = 03:00 UTC (next day)
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  autopost-tmf:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flask edge-tts Pillow openai google-api-python-client google-auth google-auth-httplib2 google-auth-oauthlib requests

      - name: Create YouTube token files
        run: |
          echo '${{ secrets.YT_TOKEN_TMF }}' > youtube_token_tmf.json

      - name: Run The Mind Files auto-post
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          FAL_API_KEY: ${{ secrets.FAL_API_KEY }}
        run: python3 auto_post.py --channel tmf
        continue-on-error: true

      - name: Commit results
        run: |
          git config --local user.email "automation@youtube.local"
          git config --local user.name "YouTube AutoPost Bot"
          git add auto_post_log.json auto_trigger_tmf_*.json 2>/dev/null || true
          git commit -m "Auto-post videos (TMF) - $(date)" || true
          git push || true

      - name: Upload logs to artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tmf-autopost-logs
          path: |
            watcher.log
            auto_post_log.json
          retention-days: 7
