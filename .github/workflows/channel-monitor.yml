name: Channel Monitor — Daily Health Check

on:
  schedule:
    # 2 AM CT = 7:00 UTC (CDT)
    - cron: '0 7 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Print report but skip email'
        required: false
        default: 'false'

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests anthropic google-api-python-client \
            google-auth google-auth-httplib2 google-auth-oauthlib

      - name: Write YouTube token files
        run: |
          echo '${{ secrets.YT_TOKEN_TMF }}' > youtube_token_tmf.json
          echo '${{ secrets.YT_TOKEN_BSG }}' > youtube_token_bsg.json
          echo '${{ secrets.YT_TOKEN_MZ }}'  > youtube_token_mz.json

      - name: Run channel monitor
        env:
          GOOGLE_SHEETS_KEY:  ${{ secrets.GOOGLE_SHEETS_KEY }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GITHUB_TOKEN:       ${{ secrets.GITHUB_TOKEN }}
        run: python3 channel_monitor.py
        continue-on-error: true

      - name: Upload monitor log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monitor-log
          path: channel_monitor.py
          retention-days: 7
